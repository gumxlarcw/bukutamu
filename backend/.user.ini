; bukutamu backend (PHP 7.4 FPM) — raise upload limits for WA Live Chat media (≤25 MB).
; Scoped to this docroot only (FPM honors .user.ini per-dir); does not touch global php.ini.
; post_max_size > upload_max_filesize to leave room for the multipart envelope + fields.
upload_max_filesize = 30M
post_max_size = 31M
memory_limit = 256M
